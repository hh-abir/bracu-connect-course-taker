<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; }
    h3 { margin-top: 0; color: #333; }
    textarea { 
      width: 100%; height: 80px; padding: 8px; margin-bottom: 10px; 
      box-sizing: border-box; font-family: monospace;
    }
    button { 
      width: 100%; padding: 10px; background-color: #0479d9; 
      color: white; border: none; cursor: pointer; font-weight: bold; 
    }
    button:hover { background-color: #035a9f; }
    .status { margin-top: 10px; font-size: 12px; color: #666; }
    .note { font-size: 11px; color: #888; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h3>Course Bot (Multi)</h3>
  <label for="courseList">Enter Courses (comma separated):</label>
  <div class="note">Example: CSE340-[01], CSE220-[03]</div>
  
  <textarea id="courseList" placeholder="CSE340-[01], CSE220-[03]"></textarea>
  
  <button id="btnStart">Start Queue</button>
  
  <div class="status" id="status">Ready.</div>

  <script src="popup.js"></script>
</body>
</html>
